spring:
  application:
    name: indicaAI

  datasource:
    url: jdbc:postgresql://localhost:5432/indicaAI_bd
    username: postgre
    password: postgre
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect